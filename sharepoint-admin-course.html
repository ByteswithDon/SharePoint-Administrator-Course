<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SharePoint Administrator Professional Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── FIGMA: Ultimate Tech Start-Up Website Kit ──────────────────
   Faithfully extracted component tokens and anatomy.
   Nav: black bg + yellow logo | Content: white | Buttons: Figma Primary/Secondary
   ─────────────────────────────────────────────────────────────── */
:root{
  /* ── Figma Brand Colors ── */
  --yellow:#fcff55;          /* Brand Primary */
  --black:#070707;           /* Darkness / Brand Secondary */
  --off-black:#131313;       /* Off Black */
  --slate:#343434;           /* Slate */
  --cinder:#747474;          /* Cinder */
  --smoke:#8f8f8f;           /* Smoke */
  --cement:#afafaf;          /* Cement */
  --off-white:#e4e4e4;       /* Off White */
  --elephant:#555555;        /* Elephant */
  --white:#ffffff;           /* Pure White */

  /* ── Figma Corner Radii ── */
  --rad1:4px;   /* corner-rad/1: chips, badges */
  --rad2:8px;   /* corner-rad/2: buttons, modals */
  --rad3:16px;  /* corner-rad/3: cards, images */

  /* ── Figma Typography ── */
  /* H1 Desktop: Outfit SemiBold 40px/44px */
  /* Body L: Outfit Regular 20px/28px  */
  /* Body M: Outfit Regular 16px/20px  */
  /* Body S: Outfit Regular 14px/17px  */
  /* Body XS: Outfit Regular 12px/16px */

  /* ── Functional Aliases ── */
  --bg:var(--white);
  --bg2:#f5f5f5;
  --card:var(--white);
  --card2:#f7f7f7;
  --border:var(--off-white);
  --border-strong:var(--slate);
  --text:var(--black);
  --text2:var(--off-black);
  --muted:var(--elephant);
  --dim:var(--smoke);
  --sidebar:#f5f5f5;

  /* ── Status Colors ── */
  --success:#16a34a;
  --success-bg:#f0fdf4;
  --success-border:#86efac;
  --error:#dc2626;
  --error-bg:#fef2f2;
  --error-border:#fca5a5;
  --warn:#d97706;
  --warn-bg:#fffbeb;
  --warn-border:#fde68a;
  --info-bg:rgba(252,255,85,.14);
  --info-border:#fcff55;

  /* legacy aliases for JS-generated HTML */
  --yellow-dim:rgba(252,255,85,.14);
  --yellow-border:#fcff55;
  --danger:var(--error);
  --card2-fallback:#f7f7f7;
  --border2:var(--cement);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',system-ui,sans-serif;background:#f8f8f6;color:var(--text);display:flex;flex-direction:column;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f8f8f6;}
::-webkit-scrollbar-thumb{background:var(--off-white);}

/* ── SVG ICON UTILITY ── */
.ico{display:inline-block;flex-shrink:0;width:18px;height:18px;object-fit:contain;filter:brightness(0);}
.ico-sm{width:14px;height:14px;}
.ico-lg{width:24px;height:24px;}
.ico-xl{width:48px;height:48px;opacity:.9;}
.ico-inv{filter:brightness(0) invert(1);}
.ico-yel{filter:brightness(0) saturate(100%) invert(97%) sepia(72%) saturate(2934%) hue-rotate(322deg) brightness(107%) contrast(101%);}

/* ── HEADER — Figma TopNav: black bg, white text, yellow accent ── */
.hdr{background:var(--black);color:var(--white);position:sticky;top:0;z-index:200;border-bottom:1.5px solid #1a1a1a;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;}
.hdr-brand{display:flex;align-items:center;gap:12px;}

/* Figma Logo Treatment: white rectangle + 4 yellow corner dots */
.hdr-logo{flex-shrink:0;}
.logo-box{position:relative;width:36px;height:36px;background:var(--white);border-radius:3px;display:flex;align-items:center;justify-content:center;}
.logo-dot{position:absolute;width:5px;height:5px;background:var(--yellow);border-radius:1px;}
.logo-dot.tl{top:2px;left:2px;}
.logo-dot.tr{top:2px;right:2px;}
.logo-dot.bl{bottom:2px;left:2px;}
.logo-dot.br{bottom:2px;right:2px;}
.logo-text{font-size:11px;font-weight:800;color:var(--black);letter-spacing:-.02em;}

.hdr-title h1{font-size:14px;font-weight:700;color:var(--white);letter-spacing:-.01em;}
.hdr-title p{font-size:11px;color:var(--cement);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.hdr-progress{font-size:11px;color:var(--cement);text-align:right;}
.hdr-progress strong{color:var(--yellow);font-weight:700;}
.btn-sm{background:transparent;border:1.5px solid var(--slate);color:var(--white);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-sm:hover{border-color:var(--yellow);color:var(--yellow);}
.btn-sm:hover .ico-inv{filter:brightness(0) saturate(100%) invert(97%) sepia(72%) saturate(2934%) hue-rotate(322deg) brightness(107%) contrast(101%);}
.prog-bar-wrap{height:2px;background:rgba(255,255,255,.08);}
.prog-bar{height:2px;background:var(--yellow);transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;}

/* ── SIDEBAR — line work: dark border, clean white ── */
.sidebar{width:260px;background:#fff;border-right:1.5px solid var(--black);position:sticky;top:61px;height:calc(100vh - 61px);overflow-y:auto;flex-shrink:0;}
.sb-label{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--cement);padding:18px 16px 6px;font-weight:700;border-bottom:1px solid var(--off-white);margin-bottom:4px;}
.sb-item{display:flex;align-items:center;padding:10px 14px;cursor:pointer;border-left:2.5px solid transparent;gap:10px;transition:all .12s;}
.sb-item:hover{background:#fafaf8;border-left-color:var(--off-white);}
.sb-item.active{background:rgba(252,255,85,.1);border-left-color:var(--yellow);}
.sb-item.active .sb-num{background:var(--yellow);color:var(--black);}
.sb-item.done .sb-status{color:var(--success);}
.sb-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--off-white);border-radius:4px;background:#fff;}
.sb-item.active .sb-icon{border-color:var(--yellow);background:rgba(252,255,85,.1);}
.sb-num{font-size:10px;font-weight:800;min-width:20px;text-align:center;flex-shrink:0;color:var(--muted);transition:all .12s;font-variant-numeric:tabular-nums;}
.sb-text{font-size:12px;line-height:1.35;flex:1;color:var(--elephant);}
.sb-item.active .sb-text{color:var(--black);font-weight:600;}
.sb-status{font-size:11px;flex-shrink:0;color:var(--cement);}
.sb-item.done .sb-status{color:var(--success);}

/* ── MAIN ── */
.main{flex:1;padding:28px 32px;max-width:880px;margin:0 auto;width:100%;}

/* ── MODULE HERO ── */
.mod-hero{display:flex;align-items:center;gap:28px;margin-bottom:28px;}
.mod-hero-content{flex:1;}
.mod-hero-illus{flex-shrink:0;width:140px;height:140px;}
.mod-hero-illus img{width:100%;height:100%;object-fit:contain;}

/* ── MODULE HEADER ── */
.mod-badge{display:inline-flex;align-items:center;gap:6px;background:var(--yellow);border:1.5px solid var(--black);color:var(--black);padding:4px 12px;border-radius:3px;font-size:10px;font-weight:800;margin-bottom:12px;letter-spacing:.1em;text-transform:uppercase;}
.mod-h2{font-size:28px;font-weight:700;margin-bottom:8px;color:var(--black);line-height:1.15;letter-spacing:-.02em;}
.mod-desc{font-size:14px;color:var(--elephant);line-height:1.75;max-width:680px;}

/* ── CARDS — line work: dark border, header = border only, no fill ── */
.card{background:#fff;border:1.5px solid var(--black);border-radius:4px;margin-bottom:16px;overflow:hidden;}
.card-hdr{padding:12px 18px;background:transparent;border-bottom:1.5px solid var(--black);display:flex;align-items:center;gap:10px;}
.card-hdr h3{font-size:13px;font-weight:700;color:var(--black);letter-spacing:.01em;}
.card-body{padding:18px;}

/* ── CONCEPT GRID — outlined boxes ── */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;}
.concept-item{background:#fff;border:1.5px solid var(--black);border-radius:4px;padding:14px;}
.concept-item h4{font-size:11px;font-weight:800;color:var(--black);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--off-white);}
.concept-item p{font-size:12px;color:var(--elephant);line-height:1.65;}

/* ── KEY POINTS ── */
.kp-list{list-style:none;}
.kp-list li{padding:8px 0;border-bottom:1px solid var(--off-white);font-size:13px;line-height:1.55;display:flex;gap:10px;color:var(--text2);align-items:flex-start;}
.kp-list li:last-child{border-bottom:none;}
.kp-list li::before{content:"—";color:var(--black);font-weight:700;flex-shrink:0;margin-top:1px;}

/* ── ALERTS — line work: left bar + outlined box ── */
.alert{padding:12px 16px;border:1.5px solid;border-radius:4px;margin-bottom:10px;font-size:12px;line-height:1.65;color:var(--slate);}
.alert-info{background:rgba(252,255,85,.06);border-color:var(--yellow);}
.alert-warn{background:var(--warn-bg);border-color:var(--warn);color:#92400e;}
.alert-danger{background:var(--error-bg);border-color:var(--error);color:#991b1b;}
.alert-success{background:var(--success-bg);border-color:var(--success);color:#166534;}

/* ── TABLE — line work grid ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:#f8f8f6;padding:8px 10px;text-align:left;border:1.5px solid var(--black);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--elephant);font-weight:800;}
.tbl td{padding:8px 10px;border:1px solid var(--off-white);vertical-align:top;color:var(--text2);}
.tbl tr:nth-child(even) td{background:#f8f8f6;}

/* ── VIDEO ── */
.vid-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:#000;border-radius:4px;margin-bottom:8px;border:1.5px solid var(--black);}
.vid-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.vid-caption{font-size:11px;color:var(--dim);text-align:center;margin-bottom:14px;}
.vid-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.vid-grid{grid-template-columns:1fr;}}

/* ── QUIZ ── */
.quiz-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:transparent;border-bottom:1.5px solid var(--black);}
.quiz-hdr h3{font-size:13px;font-weight:700;color:var(--black);display:flex;align-items:center;gap:8px;}
.quiz-hdr span{font-size:10px;background:var(--yellow);border:1.5px solid var(--black);padding:3px 10px;border-radius:3px;color:var(--black);font-weight:800;letter-spacing:.04em;}
.q-block{padding:18px;border-bottom:1px solid var(--off-white);}
.q-block:last-of-type{border-bottom:none;}
.q-scenario{background:rgba(252,255,85,.08);border:1.5px solid var(--yellow);padding:12px 14px;border-radius:4px;font-size:12px;color:var(--slate);margin-bottom:14px;line-height:1.65;}
.q-scenario-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--black);display:block;margin-bottom:4px;}
.q-type{display:inline-block;font-size:9px;background:#f8f8f6;border:1.5px solid var(--black);color:var(--elephant);padding:2px 8px;border-radius:3px;margin-bottom:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;}
.q-text{font-size:14px;font-weight:600;margin-bottom:12px;line-height:1.5;color:var(--black);}
.opts{list-style:none;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--off-white);border-radius:4px;margin-bottom:8px;cursor:pointer;transition:border-color .1s,background .1s;font-size:13px;line-height:1.5;color:var(--text2);background:#fff;}
.opt:hover{border-color:var(--black);}
.opt.selected{background:rgba(252,255,85,.12);border-color:var(--yellow);color:var(--black);}
.opt.correct{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.opt.wrong{background:var(--error-bg);border-color:var(--error);color:var(--error);}
.opt.reveal{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.opt input[type=radio]{flex-shrink:0;margin-top:3px;accent-color:var(--black);}
.opt-ind{font-size:13px;flex-shrink:0;font-weight:800;margin-left:auto;}
.opt.correct .opt-ind{color:var(--success);}
.opt.wrong .opt-ind{color:var(--error);}
.feedback{margin-top:10px;padding:11px 14px;border:1.5px solid;border-radius:4px;font-size:12px;line-height:1.65;display:none;}
.fb-ok{background:var(--success-bg);color:#166534;border-color:var(--success);}
.fb-no{background:var(--error-bg);color:#991b1b;border-color:var(--error);}
.btn-submit{background:var(--yellow);color:var(--black);border:2px solid var(--black);padding:10px 24px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:800;font-family:inherit;margin-top:16px;transition:all .15s;letter-spacing:.02em;}
.btn-submit:hover{filter:brightness(.93);}
.btn-submit:disabled{background:var(--off-white);color:var(--muted);border-color:var(--off-white);cursor:not-allowed;}
.quiz-result{padding:28px 18px;text-align:center;background:#f8f8f6;border-top:1.5px solid var(--black);}
.qs-score{font-size:52px;font-weight:800;color:var(--black);line-height:1;margin-bottom:4px;letter-spacing:-.03em;}
.qs-label{font-size:13px;color:var(--muted);margin-bottom:16px;}
.score-bar{height:4px;background:var(--off-white);border-radius:2px;margin:12px 0;overflow:hidden;border:1px solid var(--off-white);}
.score-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.4,0,.2,1);}
.fill-pass{background:var(--success);}
.fill-warn{background:var(--warn);}
.fill-fail{background:var(--error);}
.btn-retry{background:transparent;border:2px solid var(--black);color:var(--black);padding:8px 20px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;margin-right:8px;transition:all .15s;}
.btn-retry:hover{background:var(--black);color:var(--white);}
.btn-next{background:var(--yellow);color:var(--black);border:2px solid var(--black);padding:8px 22px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:800;transition:all .15s;}
.btn-next:hover{filter:brightness(.93);}

/* ── OVERVIEW ── */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:20px 0;}
.ov-card{background:#fff;border:1.5px solid var(--black);border-radius:4px;padding:16px;cursor:pointer;transition:all .15s;}
.ov-card:hover{background:rgba(252,255,85,.06);transform:translateY(-2px);}
.ov-card.done{border-color:var(--success);}
.ov-card-icon{width:36px;height:36px;margin-bottom:10px;opacity:.9;}
.ov-card h4{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--black);}
.ov-card p{font-size:11px;color:var(--dim);}
.ov-score{display:inline-flex;align-items:center;margin-top:8px;font-size:10px;background:var(--yellow);border:1.5px solid var(--black);color:var(--black);padding:2px 8px;border-radius:3px;font-weight:800;}

/* ── ADMIN ── */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(7,7,7,.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
.admin-overlay.open{display:flex;}
.admin-modal{background:#fff;border:2px solid var(--black);border-radius:4px;width:92%;max-width:780px;max-height:87vh;display:flex;flex-direction:column;overflow:hidden;}
.admin-mhdr{background:var(--black);border-bottom:2px solid var(--black);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.admin-mhdr h2{font-size:14px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:10px;}
.admin-close{background:none;border:1.5px solid var(--slate);color:var(--cement);font-size:13px;cursor:pointer;padding:4px 10px;border-radius:3px;line-height:1;transition:all .15s;font-family:inherit;font-weight:700;}
.admin-close:hover{border-color:var(--error);color:var(--error);}
.admin-login{padding:48px;text-align:center;}
.admin-login h3{margin-bottom:6px;color:var(--black);font-size:18px;font-weight:700;}
.admin-input{width:100%;max-width:280px;padding:10px 14px;border:1.5px solid var(--black);border-radius:4px;font-size:14px;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;background:#fff;color:var(--black);font-family:inherit;transition:border-color .15s;}
.admin-input:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 2px rgba(252,255,85,.3);}
.admin-hint{font-size:11px;color:var(--dim);margin-bottom:6px;}
.admin-hint strong{color:var(--black);font-weight:700;}
.admin-body{overflow-y:auto;flex:1;}
.admin-tabs{display:flex;border-bottom:1.5px solid var(--black);padding:0 18px;background:#f8f8f6;gap:0;flex-shrink:0;}
.a-tab{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);border-bottom:2.5px solid transparent;font-weight:700;font-family:inherit;letter-spacing:.02em;transition:all .12s;}
.a-tab.active{color:var(--black);border-bottom-color:var(--yellow);}
.a-tab:hover:not(.active){color:var(--black);}
.a-pane{display:none;padding:20px;}
.a-pane.active{display:block;}
.ak-mod{margin-bottom:16px;border:1.5px solid var(--black);border-radius:4px;overflow:hidden;}
.ak-mod-hdr{background:#f8f8f6;padding:10px 14px;font-size:13px;font-weight:700;border-bottom:1.5px solid var(--black);color:var(--black);}
.ak-row{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start;padding:8px 14px;border-bottom:1px solid var(--off-white);font-size:12px;}
.ak-row:last-child{border-bottom:none;}
.ak-num{font-weight:800;color:var(--black);}
.ak-ans{color:var(--success);font-weight:700;}
.ak-ans::before{content:"✓ ";font-weight:800;}
.ak-exp{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.55;}
.gloss-item{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--off-white);}
.gloss-item:last-child{border-bottom:none;}
.gloss-term{font-size:13px;font-weight:700;color:var(--black);margin-bottom:4px;}
.gloss-def{font-size:12px;color:var(--muted);line-height:1.6;}

/* ── CERTIFICATE — dark panel, yellow accent ── */
.cert{background:var(--black);border:2px solid var(--yellow);padding:40px;border-radius:4px;text-align:center;margin:16px 0;position:relative;overflow:hidden;}
.cert::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(252,255,85,.1),transparent 70%);pointer-events:none;}
.cert h2{font-size:22px;margin-bottom:8px;font-weight:800;color:var(--yellow);letter-spacing:-.02em;}
.cert p{color:var(--cement);font-size:13px;margin-bottom:4px;}
.cert-illus{width:80px;height:80px;filter:brightness(0) invert(1);opacity:.85;margin:0 auto 16px;}

/* ── MISC ── */
.divider{height:1.5px;background:var(--off-white);margin:16px 0;}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:800;margin:2px;border:1.5px solid;}
.tag-b{background:rgba(252,255,85,.1);border-color:var(--yellow);color:var(--black);}
.tag-g{background:var(--success-bg);border-color:var(--success-border);color:#166534;}
.tag-o{background:var(--warn-bg);border-color:var(--warn-border);color:#92400e;}
.tag-r{background:var(--error-bg);border-color:var(--error-border);color:#991b1b;}
.fade-in{animation:fi .22s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* ── OVERVIEW HERO — dark panel ── */
.ov-hero{background:var(--black);border:2px solid var(--black);border-radius:4px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden;display:flex;align-items:center;gap:28px;}
.ov-hero-content{flex:1;}
.ov-hero h2{font-size:26px;font-weight:800;color:var(--white);margin-bottom:8px;letter-spacing:-.02em;}
.ov-hero h2 span{color:var(--yellow);}
.ov-hero p{font-size:13px;color:var(--cement);line-height:1.75;max-width:580px;}
.ov-hero-img{flex-shrink:0;width:130px;height:130px;filter:brightness(0) invert(1);opacity:.55;}

/* ── CAPSTONE INTRO ── */
.cap-intro{background:rgba(252,255,85,.08);border:1.5px solid var(--yellow);border-radius:4px;padding:16px 18px;margin-bottom:20px;font-size:13px;color:var(--slate);line-height:1.65;}

@media(max-width:700px){
  .sidebar{display:none;}
  .vid-grid{grid-template-columns:1fr;}
  .main{padding:16px;}
  .mod-h2{font-size:22px;}

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
function buildQuiz(m, isCapstone){
  const qCount=m.questions.length;
  let html=`<div class="card" id="quiz-${m.id}">
  <div class="quiz-hdr">
    <h3>${isCapstone?'<img src="'+SECTION_ICONS.capstone+'" class="ico"> Capstone Assessment':'<img src="'+SECTION_ICONS.quiz+'" class="ico"> Knowledge Assessment'}</h3>
    <span>${qCount} Questions · Scenario-Based</span>
  </div>`;

  m.questions.forEach((q,qi)=>{
    html+=`<div class="q-block" id="qblock-${m.id}-${qi}">
    <span class="q-type">${q.type}</span>`;
    if(q.scenario) html+=`<div class="q-scenario"><span class="q-scenario-label">Scenario</span>${q.scenario}</div>`;
    html+=`<p class="q-text">Q${qi+1}. ${q.q}</p>
    <ul class="opts">`;
    q.opts.forEach((opt,oi)=>{
      html+=`<li class="opt" id="opt-${m.id}-${qi}-${oi}" onclick="selectOpt(${m.id},${qi},${oi})">
        <input type="radio" name="q-${m.id}-${qi}" value="${oi}" onclick="event.stopPropagation()">
        <span class="opt-label">${String.fromCharCode(65+oi)}. ${opt}</span>
        <span class="opt-ind" id="ind-${m.id}-${qi}-${oi}"></span>
      </li>`;
    });
    html+=`</ul>
    <div class="feedback fb-ok" id="fb-ok-${m.id}-${qi}">Correct — ${q.exp}</div>
    <div class="feedback fb-no" id="fb-no-${m.id}-${qi}">Incorrect — ${q.exp}</div>
    </div>`;
  });

  html+=`<div style="padding:16px 18px;">
    <button class="btn-submit" id="submit-${m.id}" onclick="submitQuiz(${m.id})">Submit Answers</button>
  </div>
  <div id="result-${m.id}" style="display:none;"></div>
  </div>`;
  return html;
}

let selections={};

function selectOpt(mid,qi,oi){
  const key=`${mid}-${qi}`;
  selections[key]=oi;
  const q=MODULES.find(m=>m.id===mid).questions[qi];
  q.opts.forEach((_,i)=>{
    document.getElementById(`opt-${mid}-${qi}-${i}`)?.classList.remove('selected');
  });
  document.getElementById(`opt-${mid}-${qi}-${oi}`)?.classList.add('selected');
  const radio=document.querySelector(`#opt-${mid}-${qi}-${oi} input`);
  if(radio) radio.checked=true;
}

function submitQuiz(mid){
  const m=MODULES.find(x=>x.id===mid);
  const btn=document.getElementById(`submit-${mid}`);
  let correct=0;

  m.questions.forEach((q,qi)=>{
    const key=`${mid}-${qi}`;
    const sel=selections[key];
    const isCorrect=sel===q.ans;
    if(isCorrect) correct++;

    q.opts.forEach((_,oi)=>{
      const el=document.getElementById(`opt-${mid}-${qi}-${oi}`);
      const ind=document.getElementById(`ind-${mid}-${qi}-${oi}`);
      if(!el) return;
      el.style.cursor='default';
      el.onclick=null;
      if(oi===q.ans){ el.classList.add('correct'); if(ind)ind.textContent='✓';}
      else if(oi===sel){ el.classList.add('wrong'); if(ind)ind.textContent='✗';}
    });

    const fbOk=document.getElementById(`fb-ok-${mid}-${qi}`);
    const fbNo=document.getElementById(`fb-no-${mid}-${qi}`);
    if(isCorrect){ if(fbOk)fbOk.style.display='block';}
    else{ if(fbNo)fbNo.style.display='block';}
  });

  btn.style.display='none';
  const total=m.questions.length;
  const pct=Math.round(correct/total*100);
  const pass=pct>=80;
  const fillClass=pct>=80?'fill-pass':pct>=60?'fill-warn':'fill-fail';

  progress[mid]={done:pass||progress[mid]?.done, score:pct};
  localStorage.setItem('sp_course_progress',JSON.stringify(progress));
  updateProgress();
  buildSidebar();

  let resultHtml=`<div class="quiz-result">
    <div class="qs-score">${pct}%</div>
    <div class="qs-label">${correct} of ${total} correct — ${pass?'PASSED':'Review Recommended'}</div>
    <div class="score-bar"><div class="score-fill ${fillClass}" style="width:${pct}%"></div></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px;">${pass?'Excellent work! You can proceed to the next module.':'Review the explanations above and retry to reach 80%+ to pass.'}</p>
    <button class="btn-retry" onclick="retryQuiz(${mid})">Retry</button>`;

  const nextMod=MODULES.find(x=>x.id===mid+1);
  if(nextMod) resultHtml+=`<button class="btn-next" onclick="navTo(${mid+1})">Next: ${nextMod.shortTitle||nextMod.title} →</button>`;
  if(mid===9 && pass) resultHtml+=`<div id="cert-area" style="margin-top:20px;">${buildCert()}</div>`;
  resultHtml+=`</div>`;

  document.getElementById(`result-${mid}`).innerHTML=resultHtml;
  document.getElementById(`result-${mid}`).style.display='block';
}

function retryQuiz(mid){
  const m=MODULES.find(x=>x.id===mid);
  m.questions.forEach((_,qi)=>{
    delete selections[`${mid}-${qi}`];
  });
  navTo(mid);
}

function buildCert(){
  const allDone=MODULES.filter(m=>!m.isOverview).every(m=>progress[m.id]?.done);
  const scores=MODULES.filter(m=>!m.isOverview&&progress[m.id]?.score!==undefined).map(m=>progress[m.id].score);
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  return `<div class="cert">
    <img src="${MODULE_ILLUS[9]}" class="cert-illus">
    <h2>Certificate of Completion</h2>
    <p>SharePoint Administrator Professional Course</p>
    <p>GAMA-1 IMS | CMMC Level 2 | ISO 9001/20000-1/27001</p>
    <div style="margin:16px 0;font-size:24px;font-weight:700;">${avg}% Average Score</div>
    <p style="opacity:.75;font-size:11px;">Completed: ${new Date().toLocaleDateString()}</p>
  </div>`;
}

    buildAdminPanels();
  } else {
    document.getElementById('adminPwErr').textContent='Incorrect password. Try: SP@Admin2024';
  }
}

function switchAdminTab(idx,btn){
  document.querySelectorAll('.a-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.a-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`apane${idx}`).classList.add('active');
}

function buildAdminPanels(){
  // Panel 0: Answer Keys
  let ak='';
  MODULES.filter(m=>!m.isOverview&&m.questions).forEach(m=>{
    ak+=`<div class="ak-mod"><div class="ak-mod-hdr"><img src="${MODULE_ICONS[m.id]}" class="ico ico-sm"> ${m.title}</div>`;
    m.questions.forEach((q,qi)=>{
      const correctOpt=q.opts[q.ans];
      ak+=`<div class="ak-row">
        <span class="ak-num">Q${qi+1}</span>
        <div>
          <div style="font-size:12px;margin-bottom:4px;">${q.q}</div>
          <div class="ak-ans">${String.fromCharCode(65+q.ans)}. ${correctOpt}</div>
          <div class="ak-exp">${q.exp}</div>
        </div>
      </div>`;
    });
    ak+=`</div>`;
  });
  document.getElementById('apane0').innerHTML=ak;

  // Panel 1: Glossary
  const terms=[
    {t:"Site Collection",d:"Top-level SharePoint container with isolated permission boundary, storage quota, and admin scope. The fundamental governance unit in SharePoint."},
    {t:"Hub Site",d:"A SharePoint site that aggregates associated sites for shared navigation, branding, and search scope without merging permissions."},
    {t:"Content Type Hub",d:"A designated site collection whose content types are published to all other site collections in the tenant."},
    {t:"Term Store",d:"Central managed metadata taxonomy service. Hierarchy: Term Groups → Term Sets → Terms."},
    {t:"GCC (Government Community Cloud)",d:"Microsoft 365 cloud environment meeting FedRAMP Moderate. US datacenters. Supports most CMMC Level 2 implementations."},
    {t:"GCC High",d:"Microsoft 365 environment meeting FedRAMP High. Data restricted to US persons. Required for ITAR and strict DoD contracts."},
    {t:"CMMC Level 2",d:"Cybersecurity Maturity Model Certification Advanced level. 110 practices from NIST SP 800-171. Required for organizations processing CUI."},
    {t:"CUI (Controlled Unclassified Information)",d:"Government information requiring specific safeguarding per Executive Order 13556. Triggers CMMC Level 2 requirements."},
    {t:"FCI (Federal Contract Information)",d:"Information provided/generated under a federal contract. CMMC Level 1 (17 practices) is typically sufficient unless CUI is also present."},
    {t:"Retention Label",d:"Microsoft Purview item-level label that travels with content, can declare records, and overrides retention policies. Granular lifecycle control."},
    {t:"Preservation Hold Library",d:"Hidden SharePoint library that retains copies of content deleted or modified during legal holds or retention periods."},
    {t:"Canvas Power App",d:"Microsoft Power App type that connects directly to SharePoint lists/libraries. Provides pixel-perfect UI control. Standard connectors only."},
    {t:"DLP Policy (Power Platform)",d:"Data Loss Prevention policy in Power Platform Admin Center that classifies connectors as Business (approved) or Non-Business (blocked)."},
    {t:"Azure AD Access Review",d:"Entra ID feature that periodically asks group owners/managers to certify membership. Auto-revokes access if not confirmed. Satisfies ISO 27001 A.9.2.6."},
    {t:"List View Threshold",d:"SharePoint limit of 5,000 items returnable per view query on non-indexed columns. Exceeded queries cause timeouts."},
    {t:"Least Privilege",d:"Security principle: grant only the minimum permissions required for a user to perform their specific role. Reduces attack surface."},
    {t:"eDiscovery Hold",d:"Microsoft Purview mechanism that preserves all content matching search criteria regardless of retention policy or user deletion. Required for legal holds."},
    {t:"Permission Inheritance",d:"SharePoint default: child objects inherit permissions from parent. Breaking inheritance creates unique permissions — use sparingly to avoid permission sprawl."}
  ];
  let gl='';
  terms.forEach(t=>{
    gl+=`<div class="gloss-item"><div class="gloss-term">${t.t}</div><div class="gloss-def">${t.d}</div></div>`;
  });
  document.getElementById('apane1').innerHTML=gl;

  // Panel 2: Common Mistakes
  const mistakes=[
    {h:"Using 'Everyone except external users' in Members group",exp:"This grants Contribute access to all internal users on all 47+ sites — one of the most common audit findings. Audit quarterly and remove."},
    {h:"Breaking inheritance on individual list items",exp:"Item-level permissions create unmanageable sprawl and audit failures. Design information architecture to avoid item-level permission needs."},
    {h:"Implementing legal holds via permissions or labeling only",exp:"Legal holds must use Microsoft Purview eDiscovery Holds. Permissions can be changed; eDiscovery holds cannot be circumvented."},
    {h:"Enabling self-service site creation without governance",exp:"Results in hundreds of abandoned, ungoverned sites. Disable self-service and implement a provisioning workflow with business justification."},
    {h:"Using SharePoint Groups instead of Azure AD Security Groups",exp:"SharePoint Groups are site-scoped, requiring per-site management. Azure AD Security Groups are tenant-wide, central, and auditable — always preferred."},
    {h:"Not enabling Microsoft Purview Audit Log before compliance programs",exp:"Audit data cannot be retroactively retrieved. Enable before any compliance program. Default retention is only 90 days — extend for ISO 27001."},
    {h:"Assuming hub association creates permission isolation",exp:"Hub sites share navigation/branding/search but NOT permissions. Sites remain independent. Hub association does not restrict access."},
    {h:"Using Power Automate flows without DLP policy review in GCC",exp:"Unsanctioned connectors can exfiltrate CUI to external services. All connectors must be classified in DLP policies BEFORE flows go live."},
    {h:"Confusing Retention Policies and Retention Labels",exp:"Policies are location-based (broad). Labels are item-level (granular, portable, can declare records). Use both: policies as baseline, labels for specific document types."},
    {h:"Creating deep subsite hierarchies",exp:"Modern SharePoint governance favors flat architectures. Deep subsites create permission management complexity and are difficult to migrate. Use hub associations instead."}
  ];
  let mm='';
  mistakes.forEach((mis,i)=>{
    mm+=`<div class="gloss-item"><div class="gloss-term" style="color:var(--danger);">${i+1}. ${mis.h}</div><div class="gloss-def">${mis.exp}</div></div>`;
  });
  document.getElementById('apane2').innerHTML=mm;

  // Panel 3: Learning Objectives
  let lo='';
  MODULES.filter(m=>!m.isOverview&&m.objectives).forEach(m=>{
    lo+=`<div class="ak-mod"><div class="ak-mod-hdr"><img src="${MODULE_ICONS[m.id]}" class="ico ico-sm"> ${m.title}</div>
    <div style="padding:12px 14px;"><ul class="kp-list">${m.objectives.map(o=>`<li>${o}</li>`).join('')}</ul></div></div>`;
  });
  document.getElementById('apane3').innerHTML=lo;
}

   INIT
   ============================================================ */
buildSidebar();
renderMain();
updateProgress();
</script>
